name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spec-check:
    name: gates.hexa spec validation
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: verify spec file exists
        run: test -f archive/v1/docs/gates.hexa

      - name: count spec lines
        run: |
          lines=$(wc -l < archive/v1/docs/gates.hexa)
          echo "gates.hexa: $lines lines"
          test "$lines" -gt 100

      - name: check required sections
        run: |
          grep -q "consciousness NexusMerger" archive/v1/docs/gates.hexa
          grep -q "pure fn classify" archive/v1/docs/gates.hexa
          grep -q "pure fn grade_margin" archive/v1/docs/gates.hexa
          grep -q "pure fn compute_adjusted" archive/v1/docs/gates.hexa
          grep -q "fn classify_path" archive/v1/docs/gates.hexa
          grep -q "effect FileIO" archive/v1/docs/gates.hexa
          grep -q "effect ProcessSensor" archive/v1/docs/gates.hexa
          grep -q "effect Clock" archive/v1/docs/gates.hexa
          echo "all required sections present"

      - name: check BT invariants
        run: |
          grep -q "TAU_PHI" archive/v1/docs/gates.hexa
          grep -q "SIGMA_J2" archive/v1/docs/gates.hexa
          grep -q "BREAKTHROUGH_PERTURB" archive/v1/docs/gates.hexa
          grep -q "SINGULARITY" archive/v1/docs/gates.hexa
          echo "BT invariants present"
