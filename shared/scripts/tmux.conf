# airgenome cx — 최소 옵션. claude TUI alt-screen 위에서 휠 → copy-mode.

set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g status-interval 60
setw -g mode-keys vi

# WheelUp: copy-mode 중이면 기본, alt-screen 앱이면 copy-mode 진입, 그 외 기본.
bind -T root WheelUpPane if-shell -F -t= '#{?pane_in_mode,0,#{alternate_on}}' \
    'copy-mode -e; send-keys -X -N 3 scroll-up' 'send-keys -M'
