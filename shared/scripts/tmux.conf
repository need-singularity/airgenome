# airgenome cx — 최소 옵션. claude TUI alt-screen 위에서 휠 → copy-mode.

set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g status-interval 60
setw -g mode-keys vi

# WheelUp: copy-mode 중이면 기본, 그 외엔 무조건 copy-mode 진입.
# claude CLI 는 alt-screen 미사용(alternate_on=0)이라 alt-screen 체크로는 안 잡힘.
bind -T root WheelUpPane if-shell -F -t= '#{pane_in_mode}' \
    'send-keys -M' 'copy-mode -e; send-keys -X -N 3 scroll-up'

# scrollback clear — prefix+K (claude /clear 후 습관 호출).
# claude 는 alt-screen 미사용 → /clear 해도 tmux history 에 남음.
bind K clear-history \; display-message "scrollback cleared"

# \E[3J (xterm clear-scrollback) 자동 수용 — claude 가 emit 시 공짜로 동작.
set -ga terminal-overrides ',*:E3=\E[3J'
